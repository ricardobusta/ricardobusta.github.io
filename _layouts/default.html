---
layout: compress
---
<!doctype html>
<html lang="en">
<head>
    <title>{{ page.title }} - {{ site.title }}</title>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport">
    <meta content="{{ site.title }}" property="og:title"/>
    <meta content="{{ site.url }}/assets/images/preview.png" property="og:image"/>
    <meta content="{{ site.description }}" property="og:description"/>
    <meta content="{{ site.url }}" property="og:url"/>
    <meta content="1200" property="og:image:width"/>
    <meta content="627" property="og:image:height"/>
    <meta content="website" property="og:type"/>
    <link href="/favicon.ico?" rel="icon" type="image/x-icon">
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" type="text/css">
    <link href="/assets/css/style.css" rel="stylesheet">
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-146839159-1"></script>
    <script src="/assets/uikit/js/uikit.min.js"></script>
    <script src="/assets/uikit/js/uikit-icons.min.js"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        const themeStorageKey = 'themePreference';
        const darkModeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

        function gtag() {
            dataLayer.push(arguments);
        }

        gtag('js', new Date());

        gtag('config', 'UA-146839159-1');

        function getStoredThemePreference() {
            const storedTheme = localStorage.getItem(themeStorageKey);
            return storedTheme === 'dark' || storedTheme === 'light' ? storedTheme : null;
        }

        function getPreferredTheme() {
            return getStoredThemePreference() || (darkModeMediaQuery.matches ? 'dark' : 'light');
        }

        function applyTheme(theme) {
            const isDark = theme === 'dark';

            document.body.classList.toggle('dark-mode', isDark);
            document.documentElement.style.colorScheme = theme;

            const toggle = document.getElementById('nav-toggle');
            if (toggle) {
                toggle.checked = isDark;
            }
        }

        function toggleDarkMode() {
            const nextTheme = document.body.classList.contains('dark-mode') ? 'light' : 'dark';
            localStorage.setItem(themeStorageKey, nextTheme);
            applyTheme(nextTheme);
        }

        document.addEventListener('DOMContentLoaded', () => {
            applyTheme(getPreferredTheme());

            const handleSystemThemeChange = (event) => {
                if (!getStoredThemePreference()) {
                    applyTheme(event.matches ? 'dark' : 'light');
                }
            };

            if (darkModeMediaQuery.addEventListener) {
                darkModeMediaQuery.addEventListener('change', handleSystemThemeChange);
            } else if (darkModeMediaQuery.addListener) {
                darkModeMediaQuery.addListener(handleSystemThemeChange);
            }
        });
    </script>
</head>

<body>

{{ content }}

{% include footer.html %}
</body>

</html>
