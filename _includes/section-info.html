<div class="uk-card uk-card-body uk-card-default rb-hero-card">
    <div class="rb-hero-grid" uk-grid>
        <div class="uk-width-auto@m uk-text-center">
            <img class="uk-border-circle rb-profile-avatar" src="{{ site.data.home.profile.avatar }}" alt="{{ site.data.home.profile.name }}"/>
        </div>
        <div class="uk-width-expand@m">
            <div class="rb-hero-name">{{ site.data.home.profile.name }}</div>
            <div class="rb-hero-alias">(aka {{ site.data.home.profile.nickname }} {% include icon/busta.html width="15px" %})</div>
            <p class="rb-hero-intro">{{ site.data.home.profile.intro }}</p>
            {% include links.html %}
        </div>
    </div>
</div>
