<h1 class="rb-section-title" id="Links">{{ site.data.home.links.title }}</h1>
<div class="uk-card uk-card-body uk-card-default rb-section-card">
    <ul class="uk-list uk-list-divider rb-tools-list">
        {% for item in site.data.home.links.items %}
        <li><a href="{% if item.path %}{{ item.path | relative_url }}{% else %}{{ item.url }}{% endif %}">{{ item.label }}</a></li>
        {% endfor %}
    </ul>
</div>
