<h1 class="rb-section-title" id="Links">{{ site.data.home.links.title }}</h1>
<div class="uk-card uk-card-body uk-card-default rb-section-card">
    <div class="uk-grid-small uk-child-width-1-1 uk-child-width-1-2@s uk-child-width-1-3@l rb-tools-grid" uk-grid>
        {% for item in site.data.home.links.items %}
        <div>
            <a class="rb-tool-card" href="{% if item.path %}{{ item.path | relative_url }}{% else %}{{ item.url }}{% endif %}">
                <div class="rb-tool-title">{{ item.label }}</div>
                <div class="rb-tool-description">{{ item.description }}</div>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
