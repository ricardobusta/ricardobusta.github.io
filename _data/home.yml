about:
  title: "About"
  career_start_year: 2013
  items:
    - emoji: "🔢"
      type: experience
      prefix: "<span>Senior Software Engineer</span>, working in the industry for"
      suffix: "years."
    - emoji: "🔧"
      content: 'Previously worked at <span>Wooga</span><a href="https://www.wooga.com/">[↗️]</a> - Berlin 🇩🇪 for 5 years as full time employee.'
    - emoji: "🔨"
      content: 'Also worked at <span>Tapps Games</span><a href="http://tappsgames.com/">[↗️]</a> - São Paulo, and <span>LSBD</span><a href="https://lsbd.ufc.br/">[↗️]</a> - Fortaleza.'
    - emoji: "💻"
      content: 'I use <span>Unity3D</span>, <span>C#</span> and <span>Git</span> daily.'
    - emoji: "⚙️"
      content: 'Also use to some extent: <span>C</span>, <span>C++</span>, <span>Typescript</span>, <span>Javascript</span>, <span>OpenGL</span>, <span>Direct3D</span>, <span>Google Cloud</span>, <span>Lua</span> and <span>Python</span> for projects.'
    - emoji: "🎨"
      content: 'I like to do Vector Art with <span>Inkscape</span>, Pixel Art with <span>Aseprite</span>, Textures with <span>GIMP</span> and 3D Models with <span>Blender</span>.'
    - emoji: "🎓"
      content: 'Graduated in <span>Computer Science</span> at <span>Universidade Federal do Ceará (UFC)</span>.'
    - emoji: "📚"
      content: 'Master Degree with emphasys in <span>Computer Graphics</span> and <span>Virtual Reality</span> at <span>UFC</span>.'
    - emoji: "🤖"
      content: 'Upholder of <span>Automation</span>, <span>Testing</span> and <span>Continuous Integration</span>/<span>Continuous Delivery</span>.'
    - emoji: "💬"
      content: 'I like to talk about <span>Science</span>, <span>Math</span>, <span>Computer Science</span> and <span>Technology</span>. Also send me pictures of your pets.'
    - emoji: "🪁"
      content: 'Hobbies include <span>DIY Projects</span> and <span>Playing Videogames</span>. Also, my site has a <span>Cooking Recipes</span><a href="recipes/">[↗️]</a> section.'
    - emoji: "🐈"
      content: "I have two cats: <span>Cake</span> and <span>Fionna</span>. Yes, it's from Adventure Time."

